name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build project
        run: npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            REPO_DIR="$HOME/domains/granit-sever.ru/repo"
            SITE_DIR="$HOME/domains/granit-sever.ru"

            mkdir -p "$REPO_DIR"

            echo "==> Git pull..."
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/kefir737/granite-memorial-shop "$REPO_DIR"
            else
              cd "$REPO_DIR"
              git pull origin main
            fi

            cd "$REPO_DIR"

            echo "==> Установка зависимостей..."
            npm install --frozen-lockfile

            echo "==> Сборка проекта..."
            npm run build

            echo "==> Копирование билда в корень сайта..."
            cp -r "$REPO_DIR/dist/"* "$SITE_DIR/"

            echo "==> Готово! Сайт обновлён."
