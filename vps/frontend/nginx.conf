server {
    listen 80;
    server_name granit-sever.ru www.granit-sever.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name granit-sever.ru www.granit-sever.ru;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/granit-sever.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/granit-sever.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /contact {
        proxy_pass http://api:8000/contact;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /upload-image {
        proxy_pass http://api:8000/upload-image;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /uploads/ {
        root /usr/share/nginx;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
