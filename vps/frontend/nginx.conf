server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 25m;
    }

    location /contact {
        proxy_pass http://api:8000/contact;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /upload-image {
        proxy_pass http://api:8000/upload-image;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 25m;
    }

    location = /save_image.php {
        proxy_pass http://api:8000/save_image.php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 25m;
    }

    location ^~ /embed/konstruktor/ {
        alias /usr/share/nginx/html/embed/konstruktor/;
        index index.html;
    }

    location = /konstruktor {
        try_files /index.html =404;
    }

    location = /konstruktor/ {
        try_files /index.html =404;
    }

    location ^~ /uploads/ {
        root /usr/share/nginx;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
}
