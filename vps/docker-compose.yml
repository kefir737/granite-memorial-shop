services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: granite
      POSTGRES_USER: granite
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U granite"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://granite:${DB_PASSWORD}@db:5432/granite
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_RECIPIENT: ${EMAIL_RECIPIENT}
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ../
      dockerfile: vps/frontend/Dockerfile
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - uploads:/usr/share/nginx/uploads:ro

volumes:
  pgdata:
  uploads: