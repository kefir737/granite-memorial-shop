# Rate-limit: не более 5 запросов в минуту на /api/auth с одного IP
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

server {
    listen 80;
    server_name granit-sever.ru www.granit-sever.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name granit-sever.ru www.granit-sever.ru;

    ssl_certificate /etc/letsencrypt/live/granit-sever.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/granit-sever.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20m;

    # Защита эндпоинта авторизации
    location /api/auth {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}